name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package Schema
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p dist
          if [ -d "src/schema" ]; then
            tar -czf dist/ifay-schema-${VERSION}.tar.gz -C src schema
          fi

      - name: Package Releases
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if [ -d "releases" ] && [ "$(ls -A releases)" ]; then
            tar -czf dist/ifay-releases-${VERSION}.tar.gz -C releases .
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
